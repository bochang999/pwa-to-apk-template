<?xml version="1.0" encoding="UTF-8"?>
<svg width="1024" height="1024" viewBox="0 0 1024 1024" xmlns="http://www.w3.org/2000/svg">
  <!-- Background Gradient -->
  <defs>
    <linearGradient id="bgGradient" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" style="stop-color:#3498DB;stop-opacity:1" />
      <stop offset="50%" style="stop-color:#2C3E50;stop-opacity:1" />
      <stop offset="100%" style="stop-color:#1ABC9C;stop-opacity:1" />
    </linearGradient>
    <linearGradient id="iconGradient" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" style="stop-color:#FFFFFF;stop-opacity:1" />
      <stop offset="100%" style="stop-color:#ECF0F1;stop-opacity:1" />
    </linearGradient>
  </defs>
  
  <!-- Background Circle -->
  <circle cx="512" cy="512" r="480" fill="url(#bgGradient)" stroke="#34495E" stroke-width="8"/>
  
  <!-- PWA Icon - Stylized P + Arrow -->
  <g transform="translate(512, 512)">
    <!-- P Letter -->
    <path d="M-120,-180 L-120,180 L-80,180 L-80,20 L40,20 C80,20 120,0 120,-60 C120,-120 80,-140 40,-140 L-120,-140 Z M-80,-100 L40,-100 C60,-100 80,-90 80,-60 C80,-30 60,-20 40,-20 L-80,-20 Z" 
          fill="url(#iconGradient)" stroke="#BDC3C7" stroke-width="4"/>
    
    <!-- Arrow/Web Element -->
    <path d="M60,-20 L160,-20 L140,-40 L200,-40 L200,40 L140,40 L160,20 L60,20 Z" 
          fill="#E74C3C" stroke="#C0392B" stroke-width="3"/>
    
    <!-- Connection dots -->
    <circle cx="180" cy="-60" r="12" fill="#F39C12"/>
    <circle cx="180" cy="60" r="12" fill="#F39C12"/>
    <circle cx="220" cy="0" r="15" fill="#E67E22"/>
    
    <!-- Connecting lines -->
    <line x1="180" y1="-48" x2="180" y2="48" stroke="#F39C12" stroke-width="6" opacity="0.7"/>
    <line x1="192" y1="0" x2="205" y2="0" stroke="#E67E22" stroke-width="6" opacity="0.7"/>
  </g>
  
  <!-- Decorative Elements -->
  <g opacity="0.3">
    <circle cx="200" cy="200" r="20" fill="#FFFFFF"/>
    <circle cx="824" cy="300" r="15" fill="#FFFFFF"/>
    <circle cx="150" cy="800" r="18" fill="#FFFFFF"/>
    <circle cx="750" cy="750" r="12" fill="#FFFFFF"/>
  </g>
</svg>